type Like {
  id: ID!
  createdAt: String!
  username: String!
  profilePicture: String!
}

type Post {
  id: ID!
  body: String!
  createdAt: String!
  username: String!
  comments: [Comment]!
  likes: [Like]!
  likeCount: Int!
  commentCount: Int!
  profilePicture: String!
}

type Comment {
  id: ID!
  username: String!
  createdAt: String!
  body: String!
  profilePicture: String!
}

input RegisterInput {
  username: String!
  password: String!
  confirmPassword: String!
  email: String!
  profilePicture: String!
}

input UpdateProfileInput {
  oldUsername: String!
  newUsername: String!
  email: String!
  oldPassword: String!
  newPassword: String!
  confirmPassword: String!
  profilePicture: String!
}

type Query {
  getPosts: [Post]
  getPost(postId: ID!): Post
  getUser(username: String!): User
  getUsers: [User]
}

type User {
  id: ID!
  username: String!
  password: String!
  email: String!
  token: String!
  createdAt: String!
  profilePicture: String!
}

type Mutation {
  register(registerInput: RegisterInput!): User!
  login(username: String!, password: String!): User!
  createPost(body: String!): Post!
  deletePost(postId: ID!): String!
  createComment(postId: String!, body: String!): Post!
  deleteComment(postId: String!, commentId: String!): Post!
  likePost(postId: ID!): Post!
  updateUser(updateProfileInput: UpdateProfileInput!): User!
}
