name: hiworldsocial

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-merng}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/merng}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    ports:
      - "${SERVER_PORT:-5000}:5000"
    depends_on:
      - mongo

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        REACT_APP_GRAPHQL_ENDPOINT: ${REACT_APP_GRAPHQL_ENDPOINT:-http://localhost:5000/}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - server

volumes:
  mongo-data:
