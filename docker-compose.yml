name: hiworldsocial

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-merng}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: deps
    command: sh -c "pnpm db:setup && pnpm --filter @hiworld/server codegen && pnpm --filter @hiworld/server dev"
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/merng}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://hiworld.social}
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      RESEND_API_KEY: ${RESEND_API_KEY:-re_xxxxxxxxx}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    volumes:
      - ./apps/server:/repo/apps/server
      - server-root-node-modules:/repo/node_modules
      - server-app-node-modules:/repo/apps/server/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_started

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: deps
    command: pnpm --filter @hiworld/client dev
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      VITE_GRAPHQL_ENDPOINT: ${VITE_GRAPHQL_ENDPOINT:-http://hiworld.social/graphql}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-hiworld.social}
      VITE_HMR_CLIENT_PORT: ${VITE_HMR_CLIENT_PORT:-80}
    volumes:
      - ./apps/client:/repo/apps/client
      - client-root-node-modules:/repo/node_modules
      - client-app-node-modules:/repo/apps/client/node_modules
    depends_on:
      - server

  dev-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${DEV_PROXY_PORT:-80}:80"
    volumes:
      - ./docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
      - mailpit

volumes:
  mongo-data:
  server-root-node-modules:
  server-app-node-modules:
  client-root-node-modules:
  client-app-node-modules:
